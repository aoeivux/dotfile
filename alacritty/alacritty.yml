env:
  TERM: xterm-256color

hide_cursor_when_typing: true

window:

  dimensions:
    columns: 100
    lines: 40

  # value only for macOS :
  # transparent:transparent background and title bar buttons
  # buttonless:transparent background but no title bar buttons
  decorations: buttonless

  opacity: 0.9

  # startup_mode:
  # Windowed
  # Fullscreen
  # Maximized
  startup_mode: Windowed

font:
  normal:
    family: FiraCode Nerd Font
    style: Regular

  bold:
    family: FiraCode Nerd Font
    style: Bold

  italic:
    family: FiraCode Nerd Font
    style: Italic

  bold_italic:
    family: FiraCode Nerd Font
    style: Bold Italic

  size: 15

# The 'Dark dimmed' colorscheme from Github.
colors:
  # Default colors
  primary:
    background: '#282a36'
    foreground: '#f8f8f2'

  # Normal colors
  normal:
    black: '#000000'
    red: '#ff5555'
    green: '#50fa7b'
    yellow: '#f1fa8c'
    blue: '#caa9fa'
    magenta: '#ff79c6'
    cyan: '#8be9fd'
    white: '#bfbfbf'

  # Bright colors
  bright:
    black: '#575b70'
    red: '#ff6e67'
    green: '#5af78e'
    yellow: '#f4f99d'
    blue: '#caa9fa'
    magenta: '#ff92d0'
    cyan: '#9aedfe'
    white: '#e6e6e6'
theme: Dracula
