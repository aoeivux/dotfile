env:
  TERM: xterm-256color

hide_cursor_when_typing: true

window:

  dimensions:
    columns: 100
    lines: 40

  # value only for macOS :
  # transparent:transparent background and title bar buttons
  # buttonless:transparent background but no title bar buttons
  decorations: buttonless

  opacity: 0.9

  # startup_mode:
  # Windowed
  # Fullscreen
  # Maximized
  startup_mode: Windowed


font:
  normal:
    family: JetBrainsMono NF 
    style: Regular

  bold:
    family: JetBrainsMono NF 
    style: Bold

  italic:
    family: JetBrainsMono NF 
    style: Italic

  bold_italic:
    family: JetBrainsMono NF
    style: Bold Italic

  size:
    15



# The 'Dark dimmed' colorscheme from Github.
#


# Add the following to your alacritty.yml file
# the colorscheme deus
colors:
  primary:
    background: '#2c323b'
    foreground: '#eaeaea'
  # Normal colors
  normal:
    black:   '#242a32'
    red:     '#d54e53'
    green:   '#98c379'
    yellow:  '#e5c07b'
    blue:    '#83a598'
    magenta: '#c678dd'
    cyan:    '#70c0ba'
    white:   '#eaeaea'
  # Bright colors
  bright:
    black:   '#666666'
    red:     '#ec3e45'
    green:   '#90c966'
    yellow:  '#edbf69'
    blue:    '#73ba9f'
    magenta: '#c858e9'
    cyan:    '#2bcec2'
    white:   '#ffffff'
